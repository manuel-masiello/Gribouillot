name: Build binaries

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libfuse2

      - name: Build
        run: |
          qmake gribouillot.pro
          make -j$(nproc)

      - name: Package as AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          export QMAKE=$(which qmake)
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
              --executable bin/gribouillot \
              --desktop-file packaging/gribouillot.desktop \
              --icon-file packaging/gribouillot.png \
              --plugin qt --output appimage
          mv Gribouillot*.AppImage Gribouillot-linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: Gribouillot-linux-x86_64
          path: Gribouillot-linux-x86_64.AppImage

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: win64_msvc2022_64
          cache: true

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        shell: cmd
        run: |
          qmake gribouillot.pro
          nmake

      - name: Package with Qt runtime
        shell: pwsh
        run: |
          mkdir deploy
          Copy-Item bin\gribouillot.exe deploy\
          windeployqt --no-system-d3d-compiler --no-opengl-sw deploy\gribouillot.exe
          Compress-Archive -Path deploy\* -DestinationPath Gribouillot-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Gribouillot-windows-x64
          path: Gribouillot-windows-x64.zip

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          cache: true

      - name: Build
        run: |
          qmake gribouillot.pro
          make -j3

      - name: Package as dmg
        run: |
          macdeployqt bin/gribouillot.app -dmg
          mv bin/gribouillot.dmg Gribouillot-macos-arm64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Gribouillot-macos-arm64
          path: Gribouillot-macos-arm64.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            Gribouillot-linux-x86_64.AppImage
            Gribouillot-windows-x64.zip
            Gribouillot-macos-arm64.dmg
          generate_release_notes: true
